services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./AppHost/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  consumer:
    build:
      context: .
      dockerfile: Consumer/Dockerfile
    depends_on:
      - mosquitto
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
